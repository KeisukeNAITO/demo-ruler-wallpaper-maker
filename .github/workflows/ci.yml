name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci
        env:
          # テストは src/core の純粋ロジックのみで electron 本体は不要なため
          # バイナリのダウンロードを省略して高速化する
          ELECTRON_SKIP_BINARY_DOWNLOAD: '1'
      - run: npm test
